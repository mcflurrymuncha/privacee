name: build and upload privacee windows artifacts

on:
  push:
    branches: [main]
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: check out repository
        uses: actions/checkout@v4

      - name: set up node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install dependencies
        run: npm install

      - name: compile typescript
        run: npm run build

      - name: package app binaries
        run: npx electron-builder --windows --publish never
        env:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: upload production build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: privacee-windows-build
          path: out/*.exe
          if-no-files-found: error
          retention-days: 14
